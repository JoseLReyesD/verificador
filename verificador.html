<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Cédula</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-600 h-screen flex flex-col items-center justify-center p-4"> 
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Verificador de Cédula</h1>
        <div class="space-y-4">
            <div>
                <label for="cedulaInput" class="block text-sm font-medium text-gray-700 mb-1">Ingresa el número de cédula:</label> 
                <input 
                    type="text"
                    id="cedulaInput"
                    placeholder="402-0000000-0"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    maxlength="13">
            </div>
            <button onclick="procesarValidacion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">Validar Ahora</button>
            
            <div id="resultado" class="mt-6 p-4 rounded-lg hidden text-center font-bold uppercase tracking-wide"></div>
        </div>
    </div>
    <p class="mt-6 text-xs text-center text-white opacity-80 italic">Validación basada en el algoritmo del módulo 10</p>

    <script>
        function validarCedula(cedula) {
            const c = cedula.replace(/[-\s]/g, "");

            if (c.length !== 11 || isNaN(c)) return false;

            const verificador = parseInt(c.charAt(10));
            let suma = 0;
            
            const pesos = [1, 2, 1, 2, 1, 2, 1, 2, 1, 2];

            for (let i = 0; i < 10; i++) {
                let mult = parseInt(c.charAt(i)) * pesos[i];
                if (mult > 9) mult -= 9;
                suma += mult;
            }

            let digitoEsperado = (10 - (suma % 10)) % 10;

            return digitoEsperado === verificador;
        }

        function procesarValidacion() {
            const input = document.getElementById('cedulaInput');
            const resultadoDiv = document.getElementById('resultado');
            
            if (!input.value) return;

            const esValida = validarCedula(input.value);
            
            resultadoDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');

            if (esValida) {
                resultadoDiv.innerText = "Cédula Correcta";
                resultadoDiv.classList.add('bg-green-100', 'text-green-800');
            } else {
                resultadoDiv.innerText = "Cédula Incorrecta";
                resultadoDiv.classList.add('bg-red-100', 'text-red-800');
            }
        }

        document.getElementById('cedulaInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') procesarValidacion();
        });
    </script>
</body>
</html>
